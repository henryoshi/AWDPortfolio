<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R.andom A.ccess M.emoir — Henry Shields</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── SPLASH SCREEN ────────────────────────────────────── -->
  <div id="splash">
    <div id="splash-inner">
      <p class="splash-warning">headphones required</p>
      <h1 id="splash-title">R.andom A.ccess M.emoir</h1>
      <p class="splash-sub">Henry Shields &nbsp;·&nbsp; ENGW3315 &nbsp;·&nbsp; Spring 2026</p>
      <button id="enter-btn">enter</button>
    </div>
  </div>

  <!-- ── FIXED BACKGROUND LAYERS ──────────────────────────── -->
  <div id="bg-container" aria-hidden="true">
    <div class="bg-layer" id="bg-brick"></div>
    <div class="bg-layer" id="bg-fire"></div>
    <div class="bg-layer" id="bg-ruined-city"></div>
    <div class="bg-layer" id="bg-black"></div>
    <div class="bg-layer" id="bg-hallucination"></div>
    <div class="bg-layer" id="bg-rockwall"></div>
    <div class="bg-layer" id="bg-burningcity"></div>
    <div class="bg-layer" id="bg-pond"></div>
    <div class="bg-layer" id="bg-curtain"></div>
  </div>

  <!-- ── SCROLL CONTENT ────────────────────────────────────── -->
  <main id="scroll-container">

    <!-- 1 ── OPENING ── transitions/intro.txt ── Godstained ────── -->
    <section class="section" id="opening" data-bg="brick" data-audio="godstained">
      <div class="section-inner">
        <div class="txt-content" data-src="transitions/intro.txt"></div>
      </div>
    </section>

    <!-- 2 ── ENGLISH ── writing/english.txt ── Anything Once ───── -->
    <section class="section theme-rockwall" id="english" data-bg="rockwall" data-audio="anythingonce">
      <div class="vine-track" aria-hidden="true"><div class="vine-stem-el"></div></div>
      <div class="section-inner">
        <h2 class="piece-title reveal">E.N.G.L.I.S.H.</h2>
        <div class="txt-content" data-src="writing/english.txt"></div>
      </div>
    </section>

    <!-- 3 ── TRANSITION I ── transitions/first.txt ── Maybe ─────── -->
    <section class="section spackle-section" id="transition-first" data-bg="rockwall" data-audio="maybe">
      <div class="section-inner">
        <div class="txt-content" data-src="transitions/first.txt"></div>
      </div>
    </section>

    <!-- 4 ── UNLEARNT ── emotions/unlearnt.txt ── I Didnt Understand -->
    <section class="section" id="unlearnt" data-bg="curtain" data-audio="ididntunderstand">
      <div class="section-inner">
        <h2 class="piece-title reveal">Unlearnt</h2>
        <div class="txt-content" data-src="emotions/unlearnt.txt"></div>
      </div>
    </section>

    <!-- 5a ── INTRASPECT ── emotions/intraspect.txt ── No Care ──── -->
    <section class="section theme-pond" id="intraspect" data-bg="pond" data-audio="nocare">
      <div class="section-inner pond-inner">
        <h2 class="piece-title reveal">Creature Feature.</h2>
        <div class="txt-content" data-src="emotions/intraspect.txt"></div>
      </div>
    </section>

    <!-- 5b ── INTRASPECT (cont.) ── faculty note ── Ready to Go ─── -->
    <section class="section theme-pond" id="intraspect-b" data-bg="pond" data-audio="readytogo">
      <div class="section-inner pond-inner">
      </div>
    </section>

    <!-- 6 ── TRANSITION III ── transitions/third.txt ── I'm So Tired -->
    <section class="section spackle-section" id="transition-third" data-bg="black" data-audio="imsotired">
      <div class="section-inner">
        <div class="txt-content" data-src="transitions/third.txt"></div>
      </div>
    </section>

    <!-- 7 ── SJ ── military_industry/sj.txt ── Conquest ─────────── -->
    <section class="section theme-fire" id="sj" data-bg="burningcity" data-audio="conquest">
      <div class="fire-flecks" aria-hidden="true"></div>
      <div class="section-inner">
        <h2 class="piece-title reveal">I am Concerned</h2>
        <div class="txt-content" data-src="military_industry/sj.txt"></div>
      </div>
    </section>

    <!-- 8 ── SJ ACTION ── military_industry/sj_action.txt ── Hymn For a Droid -->
    <section class="section theme-fire" id="sj-action" data-bg="burningcity" data-audio="hymnforadroid">
      <div class="fire-flecks" aria-hidden="true"></div>
      <div class="section-inner">
        <h2 class="piece-title reveal">Honor is a Luxury</h2>
        <div class="txt-content" data-src="military_industry/sj_action.txt"></div>
      </div>
    </section>

    <!-- 9 ── CONCLUSION ── transitions/conclusion.txt ── Loss of Life -->
    <section class="section spackle-section" id="transition-conclusion" data-bg="black" data-audio="lossoflife">
      <div class="section-inner">
        <div class="txt-content" data-src="transitions/conclusion.txt"></div>
      </div>
    </section>

  </main>

  <!-- SVG filter for heat shimmer on fire sections -->
  <svg id="heat-filter-svg" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;">
    <defs>
      <filter id="heat-shimmer" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="turbulence" baseFrequency="0.012 0.006" numOctaves="2" seed="5" result="turb">
          <animate attributeName="baseFrequency"
            values="0.010 0.005;0.016 0.009;0.010 0.005"
            dur="10s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turb" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- Particle canvas: dust, leaves, ash, smoke, rain, stars -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <!-- Ripple border canvas -->
  <canvas id="ripple-canvas" aria-hidden="true"></canvas>

  <script src="script.js"></script>
</body>
</html>
